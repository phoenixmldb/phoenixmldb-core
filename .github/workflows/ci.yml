name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Determine version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Restore
        run: |
          dotnet restore src/PhoenixmlDb.Core
          dotnet restore src/PhoenixmlDb.Xdm

      - name: Build
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          dotnet build src/PhoenixmlDb.Core -c Release --no-restore -p:Version="$BUILD_VERSION"
          dotnet build src/PhoenixmlDb.Xdm -c Release --no-restore -p:Version="$BUILD_VERSION"

      - name: Pack
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          dotnet pack src/PhoenixmlDb.Core -c Release --no-build \
            -p:PackageVersion="$PKG_VERSION" -o ./artifacts
          dotnet pack src/PhoenixmlDb.Xdm -c Release --no-build \
            -p:PackageVersion="$PKG_VERSION" -o ./artifacts

      - name: Upload artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

  publish:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publish to NuGet
        run: |
          for pkg in ./artifacts/*.nupkg; do
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
